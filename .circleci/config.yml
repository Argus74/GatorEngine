version: 2.1

jobs:
  build:
    docker:
      - image: gcc:latest  # Using the official GCC image
    steps:
      - checkout
      - run:
          name: Install CMake
          command: apt-get update && apt-get install -y cmake
      - run:
          name: Create Build Directory
          command: mkdir build
      - run:
          name: Run CMake
          command: cmake -Bbuild -H.  # Configure the project
      - run:
          name: Build
          command: cmake --build build  # Build the project

workflows:
  version: 2
  build_and_test:
    jobs:
      - build
