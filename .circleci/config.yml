version: 2.1

jobs:
  build:
    docker:
      - image: gcc:latest  # Using the official GCC image
    steps:
      - checkout
      - run:
          name: Install Dependencies
          command: |
            apt-get update
            apt-get install -y cmake libx11-dev libxext-dev libglu1-mesa-dev freeglut3-dev mesa-common-dev libudev-dev libopenal-dev libvorbis-dev libogg-dev
      - run:
          name: Create Build Directory
          command: mkdir build
      - run:
          name: Run CMake
          command: cmake -Bbuild -H.  # Configure the project
      - run:
          name: Build
          command: cmake --build build  # Build the project

workflows:
  version: 2
  build_and_test:
    jobs:
      - build
