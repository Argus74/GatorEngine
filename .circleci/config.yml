version: 2.1

executors:
  windows-executor:
    machine:
      image: windows-server-2019-vs2019:stable
  macos-executor:
    macos:
      xcode: "12.0.0"

jobs:
  build-windows:
    executor: windows-executor
    steps:
      - checkout
      # Add your build commands here
      - run:
          name: Build
          command: |
            cmake -Bbuild -H. 
            cmake --build build

  build-macos:
    executor: macos-executor
    steps:
      - checkout
      # Add your build commands here
      - run:
          name: Install Dependencies
          command: brew install cmake
      - run:
          name: Build
          command: |
            cmake -Bbuild -H. 
            cmake --build build

workflows:
  version: 2
  build-all:
    jobs:
      - build-windows
      - build-macos
